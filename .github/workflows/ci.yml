name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with 100% coverage gate
        run: |
          pytest tests/ \
            --cov=pain001_loader_mt101 --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100

      - name: Enforce 100% docstring coverage
        run: interrogate -c pyproject.toml pain001_loader_mt101

      - name: Run examples end-to-end
        run: |
          for example in examples/*.py; do
            echo "--- $example ---"
            python "$example"
          done

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check pain001_loader_mt101/ tests/ examples/

      - name: Mypy
        run: mypy pain001_loader_mt101/
